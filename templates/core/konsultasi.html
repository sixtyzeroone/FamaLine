{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-5 py-12">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-charcoal">Konsultasi <span class="text-teracotta">1-on-1</span></h1>
        <p class="text-gray-500">Sesi privat bersama psikolog anak berpengalaman</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg border border-cream-200 p-8">
        <form method="post">
            {% csrf_token %}
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Nama Lengkap *</label>
                    <input type="text" name="nama" required class="w-full px-4 py-3 rounded-xl border border-cream-300">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Email *</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-cream-300">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">WhatsApp *</label>
                    <input type="tel" name="whatsapp" required class="w-full px-4 py-3 rounded-xl border border-cream-300" placeholder="08xxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Pilih Psikolog *</label>
                    <select name="psikolog" required class="w-full px-4 py-3 rounded-xl border border-cream-300">
                        <option value="">Pilih</option>
                        <option>Dr. Sari Wijaya, M.Psi</option>
                        <option>Dr. Ahmad Fauzi, S.Psi</option>
                        <option>Maya Rizki, M.Psi</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Tanggal *</label>
                    <input type="date" name="tanggal" required class="w-full px-4 py-3 rounded-xl border border-cream-300">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Waktu *</label>
                    <select name="waktu" required class="w-full px-4 py-3 rounded-xl border border-cream-300">
                        <option>09:00</option>
                        <option>10:30</option>
                        <option>13:00</option>
                        <option>14:30</option>
                        <option>16:00</option>
                        <option>19:00</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-sm font-bold mb-2">Metode Konsultasi *</label>
                <div class="flex flex-wrap gap-4">
                    <label><input type="radio" name="metode" value="video" required> Video Call (Rp175k)</label>
                    <label><input type="radio" name="metode" value="chat"> Chat (Rp125k)</label>
                    <label><input type="radio" name="metode" value="telepon"> Telepon (Rp150k)</label>
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-sm font-bold mb-2">Topik Konsultasi</label>
                <textarea name="topik" rows="3" class="w-full px-4 py-3 rounded-xl border border-cream-300" placeholder="Ceritakan tantangan Anda..."></textarea>
            </div>
            <button type="submit" class="w-full mt-6 bg-teracotta text-white font-bold py-3 rounded-xl hover:shadow-lg transition">Booking Konsultasi</button>
        </form>
        <div class="mt-4 text-center text-xs text-gray-400">
            <i class="fas fa-lock mr-1"></i> Data Anda akan dirahasiakan
        </div>
    </div>
</div>
{% endblock %}
